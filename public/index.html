<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudSync Support</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <header class="chat-header">
      <h1>CloudSync Support</h1>
      <p>Ask me anything about CloudSync</p>
    </header>
    <div class="chat-messages" id="messages">
      <div class="message bot-message">
        <div class="message-bubble">
          Hi! I'm the CloudSync support assistant. How can I help you today?
        </div>
      </div>
    </div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type your question..." autocomplete="off">
      <button id="sendBtn">Send</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
